name: iOS Build + Deploy via Tailscale

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to deploy (leave empty for all)'
        required: false

jobs:
  build-and-deploy:
    name: Compile + Deploy to iPhone
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-actions-deployer
          args: --accept-routes --shields-up=false

      - name: Verify device reachable
        run: |
          tailscale status
          ping -c 2 -W 5 100.121.183.90 && echo "DEVICE OK" || echo "ping failed"

      - name: Install dependencies
        run: |
          brew install ldid dpkg 2>/dev/null || true
          which ldid && ldid 2>&1 | head -1 || true
          which dpkg && dpkg --version | head -1
          perl --version | head -1

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks "$THEOS/sdks"
          ls "$THEOS/sdks" | grep iPhone
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH
          echo "$THEOS/vendor/logos/bin" >> $GITHUB_PATH

      - name: Compile packages
        run: |
          PACKAGES_DIR="$GITHUB_WORKSPACE/packages"
          mkdir -p "$PACKAGES_DIR"
          TARGET_APP="${{ github.event.inputs.app_name }}"

          compile_app() {
            local app_dir="$1"
            local app_name=$(basename "$app_dir")
            echo "====== Compiling: $app_name ======"
            cd "$GITHUB_WORKSPACE/$app_dir"
            make package \
              THEOS_PACKAGE_DIR="$PACKAGES_DIR" \
              ARCHS="arm64 arm64e" \
              TARGET="iphone:clang:16.5:14.0" \
              STRIP=0 \
              DEBUG=1 \
              2>&1
            local exit_code=$?
            cd "$GITHUB_WORKSPACE"
            [ $exit_code -eq 0 ] && echo "OK: $app_name" || echo "FAILED: $app_name (exit $exit_code)"
            return $exit_code
          }

          if [ -n "$TARGET_APP" ] && [ -d "apps/$TARGET_APP" ]; then
            compile_app "apps/$TARGET_APP"
          else
            FAILED=0
            for app_dir in apps/*/; do
              [ -f "${app_dir}Makefile" ] || continue
              compile_app "$app_dir" || FAILED=$((FAILED+1))
            done
            [ $FAILED -eq 0 ] || { echo "$FAILED app(s) failed to compile"; exit 1; }
          fi

          echo "=== Packages ==="
          find "$PACKAGES_DIR" -name '*.deb' -exec ls -lh {} \;

      - name: Install sshpass
        run: brew install hudochenkov/sshpass/sshpass

      - name: Deploy to iPhone
        env:
          IOS_SSH_PASS: ${{ secrets.IOS_SSH_PASS }}
        run: |
          DEVICE_IP="100.121.183.90"
          SSH="sshpass -p $IOS_SSH_PASS ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20"
          SCP="sshpass -p $IOS_SSH_PASS scp -o StrictHostKeyChecking=no -o ConnectTimeout=20"

          echo "Testing SSH..."
          $SSH root@$DEVICE_IP "uname -a" && echo "SSH OK"

          for deb in packages/*.deb; do
            [ -f "$deb" ] || { echo "No .deb found"; exit 1; }
            name=$(basename "$deb")
            echo "Deploying $name..."
            $SCP "$deb" root@$DEVICE_IP:/tmp/
            $SSH root@$DEVICE_IP "dpkg -i /tmp/$name; rm -f /tmp/$name"
          done

          $SSH root@$DEVICE_IP "nohup sh -c 'sleep 1; ldrestart 2>/dev/null || killall SpringBoard' >/dev/null 2>&1 &" || true
          echo "DEPLOY COMPLETE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-packages-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
