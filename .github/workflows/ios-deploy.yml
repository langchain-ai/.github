name: iOS Build & Auto-Deploy

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build + Publish Packages
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install deps
        run: brew install ldid dpkg

      - name: Install Theos
        run: |
          git clone --recursive --depth=1 https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks ~/theos/sdks

      - name: Build packages
        id: build
        continue-on-error: true
        env:
          THEOS: /Users/runner/theos
          THEOS_MAKE_PATH: /Users/runner/theos/makefiles
        run: |
          set +e
          export PATH="/Users/runner/theos/bin:/Users/runner/theos/vendor/logos/bin:$PATH"
          mkdir -p packages
          LOG="$GITHUB_WORKSPACE/packages/build-report.txt"
          echo "Build started: $(date -u)" > "$LOG"
          echo "Commit: ${{ github.sha }}" >> "$LOG"
          echo "" >> "$LOG"

          # Prepare layouts
          mkdir -p apps/github-agent/layout/usr/local/bin
          cp apps/github-agent/github-agent.sh apps/github-agent/layout/usr/local/bin/
          mkdir -p apps/claude-daemon/layout/var/mobile/claude-daemon
          [ -f apps/claude-daemon/system-control.sh ] && \
            cp apps/claude-daemon/system-control.sh apps/claude-daemon/layout/var/mobile/claude-daemon/ || true

          FAIL=0
          TARGET="${{ github.event.inputs.app_name }}"

          compile_app() {
            local dir="$1"
            local name
            name=$(basename "$dir")
            echo "" >> "$LOG"
            echo "=== $name ==" >> "$LOG"
            echo "--- Compiling: $name ---"
            cd "$GITHUB_WORKSPACE/$dir"
            make package \
              THEOS=/Users/runner/theos \
              THEOS_MAKE_PATH=/Users/runner/theos/makefiles \
              THEOS_PACKAGE_DIR="$GITHUB_WORKSPACE/packages" \
              ARCHS="arm64 arm64e" \
              TARGET="iphone:clang:16.5:14.0" \
              SYSROOT="/Users/runner/theos/sdks/iPhoneOS16.5.sdk" \
              FINALPACKAGE=1 2>&1 | tee -a "$LOG"
            local rc=${PIPESTATUS[0]}
            if [ $rc -eq 0 ]; then
              echo "RESULT: OK" >> "$LOG"
              echo "OK: $name"
            else
              echo "RESULT: FAIL (exit $rc)" >> "$LOG"
              echo "FAIL: $name"
            fi
            cd "$GITHUB_WORKSPACE"
            return $rc
          }

          if [ -n "$TARGET" ] && [ -d "apps/$TARGET" ]; then
            compile_app "apps/$TARGET" || FAIL=1
          else
            for d in apps/*/; do
              [ -f "${d}Makefile" ] && { compile_app "$d" || FAIL=1; }
            done
          fi

          echo "" >> "$LOG"
          echo "=== Built packages ==" >> "$LOG"
          find packages -name '*.deb' -exec ls -lh {} \; 2>&1 | tee -a "$LOG"
          echo "" >> "$LOG"
          echo "Build finished: $(date -u) — exit $FAIL" >> "$LOG"

          exit $FAIL

      - name: Commit packages + build report
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f packages/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            STATUS="${{ steps.build.outcome }}"
            git commit -m "chore(packages): build ${{ github.sha }} [${STATUS}]"
            git push origin ${{ github.ref_name }} && echo "Pushed" || echo "Push failed"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/
          retention-days: 30
