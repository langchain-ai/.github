name: iOS Build + Deploy via Tailscale

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to deploy (empty = all)'
        required: false

env:
  DEVICE_IP: "100.121.183.90"
  DEVICE_USER: "root"
  DEVICE_PORT: "22"

jobs:
  # ============================================================
  # JOB 1: Compile on macOS (Theos requires macOS toolchain)
  # ============================================================
  compile:
    name: Compile (.deb)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (ldid, dpkg)
        run: brew install ldid dpkg

      - name: Install Theos + iOS 16.5 SDK
        run: |
          export THEOS=~/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks "$THEOS/sdks"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile all apps
        env:
          THEOS: "/Users/runner/theos"
          THEOS_MAKE_PATH: "/Users/runner/theos/makefiles"
        run: |
          export PATH="/Users/runner/theos/bin:/Users/runner/theos/vendor/logos/bin:$PATH"
          PKGDIR="$GITHUB_WORKSPACE/packages"
          mkdir -p "$PKGDIR"
          TARGET_APP="${{ github.event.inputs.app_name }}"
          FAIL=0

          compile() {
            local dir="$1" name=$(basename "$1")
            echo "=== Compiling: $name ==="
            cd "$GITHUB_WORKSPACE/$dir"
            make package \
              THEOS=/Users/runner/theos \
              THEOS_MAKE_PATH=/Users/runner/theos/makefiles \
              THEOS_PACKAGE_DIR="$PKGDIR" \
              ARCHS="arm64 arm64e" \
              TARGET="iphone:clang:16.5:14.0" \
              SYSROOT="/Users/runner/theos/sdks/iPhoneOS16.5.sdk" \
              FINALPACKAGE=1 2>&1 && echo "OK: $name" || { echo "FAIL: $name"; return 1; }
            cd "$GITHUB_WORKSPACE"
          }

          if [ -n "$TARGET_APP" ] && [ -d "apps/$TARGET_APP" ]; then
            compile "apps/$TARGET_APP" || FAIL=1
          else
            for d in apps/*/; do
              [ -f "${d}Makefile" ] && { compile "$d" || FAIL=1; }
            done
          fi

          echo "=== Packages ==="
          find "$PKGDIR" -name '*.deb' -exec ls -lh {} \;
          exit $FAIL

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 7

  # ============================================================
  # JOB 2: Deploy on Ubuntu (Tailscale action = Linux only)
  # ============================================================
  deploy:
    name: Deploy to iPhone
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10

    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/

      - name: List packages
        run: ls -lh packages/

      - name: Connect Tailscale (Linux)
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-deployer
          args: --accept-routes

      - name: Verify device reachable
        run: |
          tailscale status
          ping -c 2 -W 5 $DEVICE_IP && echo "DEVICE ONLINE" || echo "ping failed"

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: SSH test
        env:
          P: ${{ secrets.IOS_SSH_PASS }}
        run: |
          sshpass -p "$P" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            -p $DEVICE_PORT $DEVICE_USER@$DEVICE_IP "uname -a && echo SSH_OK"

      - name: Deploy packages
        env:
          P: ${{ secrets.IOS_SSH_PASS }}
        run: |
          SSH="sshpass -p $P ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -p $DEVICE_PORT"
          SCP="sshpass -p $P scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -P $DEVICE_PORT"

          for deb in packages/*.deb; do
            [ -f "$deb" ] || continue
            name=$(basename "$deb")
            echo "==> $name"
            $SCP "$deb" $DEVICE_USER@$DEVICE_IP:/tmp/
            $SSH $DEVICE_USER@$DEVICE_IP "dpkg -i /tmp/$name; rm -f /tmp/$name"
          done

          $SSH $DEVICE_USER@$DEVICE_IP \
            "nohup sh -c 'sleep 2; ldrestart 2>/dev/null || killall SpringBoard' >/dev/null 2>&1 &" || true
          echo "DEPLOY COMPLETE"

      - name: Upload artifacts (retain)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployed-run${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
