name: iOS Build + Deploy

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to deploy (empty = all)'
        required: false

env:
  DEVICE_IP: "100.121.183.90"
  DEVICE_USER: "root"
  DEVICE_PORT: "22"

jobs:
  compile:
    name: Compile
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: brew install ldid dpkg
      - name: Theos
        run: |
          git clone --recursive --depth=1 https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks ~/theos/sdks
      - name: Compile
        env:
          THEOS: /Users/runner/theos
          THEOS_MAKE_PATH: /Users/runner/theos/makefiles
        run: |
          export PATH="/Users/runner/theos/bin:/Users/runner/theos/vendor/logos/bin:$PATH"
          mkdir -p packages
          mkdir -p apps/github-agent/layout/usr/local/lib/github-agent
          cp apps/github-agent/github-agent.sh apps/github-agent/layout/usr/local/lib/github-agent/
          TARGET="${{ github.event.inputs.app_name }}"
          FAIL=0
          run_compile() {
            local d="$1" n=$(basename $1)
            cd "$GITHUB_WORKSPACE/$d"
            make package THEOS=/Users/runner/theos THEOS_MAKE_PATH=/Users/runner/theos/makefiles \
              THEOS_PACKAGE_DIR="$GITHUB_WORKSPACE/packages" \
              ARCHS="arm64 arm64e" TARGET="iphone:clang:16.5:14.0" \
              SYSROOT="/Users/runner/theos/sdks/iPhoneOS16.5.sdk" FINALPACKAGE=1 2>&1 \
              && echo "OK: $n" || { echo "FAIL: $n"; return 1; }
            cd "$GITHUB_WORKSPACE"
          }
          if [ -n "$TARGET" ] && [ -d "apps/$TARGET" ]; then
            run_compile "apps/$TARGET" || FAIL=1
          else
            for d in apps/*/; do [ -f "${d}Makefile" ] && { run_compile "$d" || FAIL=1; }; done
          fi
          find packages -name '*.deb' -exec ls -lh {} \;
          exit $FAIL
      - uses: actions/upload-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-deployer
          args: --accept-routes
      - name: sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy
        env:
          P: ${{ secrets.IOS_SSH_PASS }}
          PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          SSH="sshpass -p $P ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -p $DEVICE_PORT"
          SCP="sshpass -p $P scp -o StrictHostKeyChecking=no -o ConnectTimeout=20 -P $DEVICE_PORT"
          $SSH $DEVICE_USER@$DEVICE_IP "uname -a" && echo "SSH OK"
          for deb in packages/*.deb; do
            [ -f "$deb" ] || continue
            name=$(basename "$deb")
            $SCP "$deb" $DEVICE_USER@$DEVICE_IP:/tmp/
            $SSH $DEVICE_USER@$DEVICE_IP "dpkg -i /tmp/$name; rm -f /tmp/$name"
          done
          if [ -n "$PAT" ]; then
            $SSH $DEVICE_USER@$DEVICE_IP "mkdir -p /var/mobile/github-agent && printf 'GITHUB_TOKEN=%s\nREPO=Benjaminh94-wq/.github\nBRANCH=claude/create-claude-md-jdEx9\nPOLL_INTERVAL=10\n' '$PAT' > /var/mobile/github-agent/agent.conf && chmod 600 /var/mobile/github-agent/agent.conf && launchctl load /Library/LaunchDaemons/com.claudepipeline.githubagent.plist 2>/dev/null || true"
            echo "Agent configured and started"
          fi
          $SSH $DEVICE_USER@$DEVICE_IP "nohup sh -c 'sleep 2; ldrestart 2>/dev/null || killall SpringBoard' >/dev/null 2>&1 &" || true
          echo "DEPLOY COMPLETE"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployed-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
