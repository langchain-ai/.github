name: iOS Build & Auto-Deploy

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build + Publish Packages
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install deps
        run: brew install ldid dpkg

      - name: Install Theos
        run: |
          git clone --recursive --depth=1 https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks ~/theos/sdks

      - name: Build packages
        env:
          THEOS: /Users/runner/theos
          THEOS_MAKE_PATH: /Users/runner/theos/makefiles
        run: |
          export PATH="/Users/runner/theos/bin:/Users/runner/theos/vendor/logos/bin:$PATH"
          mkdir -p packages

          # Prepare github-agent layout
          mkdir -p apps/github-agent/layout/usr/local/bin
          cp apps/github-agent/github-agent.sh apps/github-agent/layout/usr/local/bin/

          # Prepare claude-daemon layout
          mkdir -p apps/claude-daemon/layout/var/mobile/claude-daemon
          [ -f apps/claude-daemon/system-control.sh ] && \
            cp apps/claude-daemon/system-control.sh apps/claude-daemon/layout/var/mobile/claude-daemon/ || true

          FAIL=0
          TARGET="${{ github.event.inputs.app_name }}"

          compile_app() {
            local dir="$1" name
            name=$(basename "$dir")
            echo "=== Compiling: $name ==="
            cd "$GITHUB_WORKSPACE/$dir"
            make package \
              THEOS=/Users/runner/theos \
              THEOS_MAKE_PATH=/Users/runner/theos/makefiles \
              THEOS_PACKAGE_DIR="$GITHUB_WORKSPACE/packages" \
              ARCHS="arm64 arm64e" \
              TARGET="iphone:clang:16.5:14.0" \
              SYSROOT="/Users/runner/theos/sdks/iPhoneOS16.5.sdk" \
              FINALPACKAGE=1 2>&1 \
              && echo "OK: $name" \
              || { echo "FAIL: $name"; return 1; }
            cd "$GITHUB_WORKSPACE"
          }

          if [ -n "$TARGET" ] && [ -d "apps/$TARGET" ]; then
            compile_app "apps/$TARGET" || FAIL=1
          else
            for d in apps/*/; do
              [ -f "${d}Makefile" ] && { compile_app "$d" || FAIL=1; }
            done
          fi

          echo "=== Built packages ==="
          find packages -name '*.deb' -exec ls -lh {} \;
          exit $FAIL

      - name: Commit packages to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f packages/*.deb 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new packages (unchanged)"
          else
            git commit -m "chore(packages): build ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
            echo "Packages committed and pushed"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
