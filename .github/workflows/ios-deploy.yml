name: iOS Build + Deploy via Tailscale

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to deploy (leave empty for all)'
        required: false

jobs:
  build-and-deploy:
    name: Compile + Deploy to iPhone
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Tailscale: join the user's tailnet --------------------------------
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-actions-deployer
          args: --accept-routes

      # ---- Verify device is reachable ----------------------------------------
      - name: Ping iPhone
        run: |
          echo "Pinging 100.121.183.90..."
          ping -c 3 100.121.183.90 || true
          # Try SSH port
          nc -zv 100.121.183.90 22 && echo "SSH port open" || echo "SSH port not responding"

      # ---- Install Theos build system ----------------------------------------
      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git $THEOS
          git -C $THEOS/sdks clone --depth=1 https://github.com/theos/sdks .
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      # ---- Compile all apps or a specific one --------------------------------
      - name: Compile Theos packages
        run: |
          TARGET_APP="${{ github.event.inputs.app_name }}"
          PACKAGES_DIR="$GITHUB_WORKSPACE/packages"
          mkdir -p "$PACKAGES_DIR"

          compile_app() {
            local app_dir="$1"
            local app_name=$(basename "$app_dir")
            echo "==> Compiling $app_name..."
            (cd "$app_dir" && make package THEOS_PACKAGE_DIR="$PACKAGES_DIR" ARCHS=arm64e TARGET=iphone:clang:16.5:15.0 2>&1)
            echo "==> Done: $app_name"
          }

          if [ -n "$TARGET_APP" ] && [ -d "apps/$TARGET_APP" ]; then
            compile_app "apps/$TARGET_APP"
          else
            for app_dir in apps/*/; do
              [ -f "$app_dir/Makefile" ] && compile_app "$app_dir"
            done
          fi

          echo "=== Built packages ==="
          find "$PACKAGES_DIR" -name '*.deb' | while read f; do
            echo "  $f ($(du -h $f | cut -f1))"
          done

      # ---- Deploy all .deb files to iPhone via SSH ---------------------------
      - name: Deploy to iPhone
        env:
          IOS_SSH_PASS: ${{ secrets.IOS_SSH_PASS }}
        run: |
          brew install hudochenkov/sshpass/sshpass 2>/dev/null || brew install sshpass 2>/dev/null || true

          DEVICE_IP="100.121.183.90"
          DEVICE_USER="root"
          DEVICE_PORT="22"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15 -p $DEVICE_PORT"

          deploy_deb() {
            local deb="$1"
            local name=$(basename "$deb")
            echo "==> Deploying $name..."
            sshpass -p "$IOS_SSH_PASS" scp $SSH_OPTS "$deb" "$DEVICE_USER@$DEVICE_IP:/tmp/$name"
            sshpass -p "$IOS_SSH_PASS" ssh $SSH_OPTS "$DEVICE_USER@$DEVICE_IP" \
              "dpkg -i /tmp/$name && rm /tmp/$name && echo 'Installed: $name'"
            echo "==> Deployed: $name"
          }

          find packages/ -name '*.deb' | while read deb; do
            deploy_deb "$deb"
          done

          # Restart SpringBoard to activate tweaks
          echo "==> Restarting SpringBoard..."
          sshpass -p "$IOS_SSH_PASS" ssh $SSH_OPTS "$DEVICE_USER@$DEVICE_IP" \
            "(ldrestart 2>/dev/null || killall SpringBoard 2>/dev/null || true) &"
          echo "==> Deploy complete"

      # ---- Upload packages as artifacts for inspection -----------------------
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-packages-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
