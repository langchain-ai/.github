name: iOS Build + Deploy via Tailscale

on:
  push:
    paths:
      - 'apps/**'
    branches:
      - 'claude/**'
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to deploy (leave empty for all)'
        required: false

jobs:
  build-and-deploy:
    name: Compile + Deploy to iPhone
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Tailscale --------------------------------------------------------
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-actions-deployer
          args: --accept-routes --shields-up=false

      - name: Verify Tailscale + ping iPhone
        run: |
          tailscale status
          echo "Pinging 100.121.183.90..."
          ping -c 3 -W 5 100.121.183.90 && echo "DEVICE REACHABLE" || echo "WARNING: ping failed, trying SSH anyway"

      # ---- Install Theos ----------------------------------------------------
      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git "$THEOS"
          # Clone SDKs into the sdks subdirectory
          rm -rf "$THEOS/sdks"
          git clone --depth=1 https://github.com/theos/sdks "$THEOS/sdks"
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "THEOS_MAKE_PATH=$THEOS/makefiles" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH
          ls "$THEOS/sdks" | grep iPhone

      # ---- Compile ----------------------------------------------------------
      - name: Compile Theos packages
        run: |
          TARGET_APP="${{ github.event.inputs.app_name }}"
          PACKAGES_DIR="$GITHUB_WORKSPACE/packages"
          mkdir -p "$PACKAGES_DIR"

          compile_app() {
            local app_dir="$1"
            local app_name
            app_name=$(basename "$app_dir")
            echo "==> Compiling $app_name..."
            cd "$app_dir"
            make package \
              THEOS_PACKAGE_DIR="$PACKAGES_DIR" \
              ARCHS=arm64e \
              TARGET="iphone:clang:16.5:15.0" \
              2>&1 || { echo "COMPILE FAILED: $app_name"; return 1; }
            cd "$GITHUB_WORKSPACE"
            echo "==> Done: $app_name"
          }

          if [ -n "$TARGET_APP" ] && [ -d "apps/$TARGET_APP" ]; then
            compile_app "apps/$TARGET_APP"
          else
            for app_dir in apps/*/; do
              [ -f "${app_dir}Makefile" ] && compile_app "$app_dir"
            done
          fi

          echo "=== Built packages ==="
          find "$PACKAGES_DIR" -name '*.deb' -exec ls -lh {} \;

      # ---- Install sshpass --------------------------------------------------
      - name: Install sshpass
        run: |
          brew install hudochenkov/sshpass/sshpass
          which sshpass && sshpass -V

      # ---- Deploy -----------------------------------------------------------
      - name: Deploy .deb to iPhone via SSH
        env:
          IOS_SSH_PASS: ${{ secrets.IOS_SSH_PASS }}
        run: |
          DEVICE_IP="100.121.183.90"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=20 -p 22"

          # Test SSH first
          echo "Testing SSH connection..."
          sshpass -p "$IOS_SSH_PASS" ssh $SSH_OPTS root@$DEVICE_IP "uname -a" \
            && echo "SSH OK" || { echo "SSH FAILED"; exit 1; }

          # Deploy each .deb
          for deb in packages/*.deb; do
            [ -f "$deb" ] || continue
            name=$(basename "$deb")
            echo "==> Deploying $name"
            sshpass -p "$IOS_SSH_PASS" scp $SSH_OPTS "$deb" root@$DEVICE_IP:/tmp/
            sshpass -p "$IOS_SSH_PASS" ssh $SSH_OPTS root@$DEVICE_IP \
              "dpkg -i /tmp/$name; rm -f /tmp/$name; echo 'Installed: $name'"
          done

          # Restart SpringBoard
          echo "==> Restarting SpringBoard..."
          sshpass -p "$IOS_SSH_PASS" ssh $SSH_OPTS root@$DEVICE_IP \
            "nohup sh -c 'sleep 1; ldrestart 2>/dev/null || killall SpringBoard 2>/dev/null' &"
          echo "DEPLOY COMPLETE"

      # ---- Artifacts --------------------------------------------------------
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-packages-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 30
